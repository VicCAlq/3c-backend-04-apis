<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
  <title>Álbum da copa</title>

<body>
  <h1>Seleção 2026</h1>
  <h3>Escale seu jogador</h3>
  <form action="/api/figurinhas/convocar" method="GET" style="width: 450px;">
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" name="nome" required style="width: 420px"><br>

    <p>Posição do jogador</p>
    <section style="display: flex; flex-direction: row; gap: 10px">
      <label> <input type="radio" name="posicao" value="atacante" required> Atacante </label><br>
      <label> <input type="radio" name="posicao" value="meio-campo" required> Meio-campo </label><br>
      <label> <input type="radio" name="posicao" value="zagueiro" required> Zagueiro </label><br>
      <label> <input type="radio" name="posicao" value="goleiro" required> Goleiro </label><br>
    </section><br><br>

    <label for="camisa">Camisa:</label><br>
    <input type="number" id="camisa" name="camisa" required style="width: 420px"><br>

    <div style="width: 100%; display: flex; flex-direction: row; justify-content: end;">
      <button type="submit">Convocar</button>
    </div>
  </form>

  <h3>Jogadores convocados</h3>

          <td> <strong>Desconvidar</strong> </td>
        </tr>
      </th>
      <tbody id="lista-de-jogadores">

      </tbody>
      
    </table>
